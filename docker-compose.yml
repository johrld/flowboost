services:
  api:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "${PORT:-6100}:${PORT:-6100}"
    volumes:
      - ./backend/data:/app/data
    env_file: .env
    environment:
      - DATA_DIR=/app/data
      - FRONTEND_URL=http://localhost:${FRONTEND_PORT:-6101}
    restart: unless-stopped

  dashboard:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend.dev
    ports:
      - "${FRONTEND_PORT:-6101}:6001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file: .env
    environment:
      - PORT=6001
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://localhost:${PORT:-6100}
      - WATCHPACK_POLLING=true
    depends_on:
      - api
    restart: unless-stopped
